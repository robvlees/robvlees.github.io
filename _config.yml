# Site Settings
lang: en
title: Rob Vleeshouwers | Linux DevOps Engineer & Blender Artist
tagline: Linux DevOps Engineer & Blender 3D Artist | Technical Expertise & Creative Portfolio
email: robvlees@gmail.com
description: >
  Rob Vleeshouwers - Professional portfolio showcasing expertise in Linux DevOps engineering, IT infrastructure, security implementation, and Blender 3D artistry. Explore technical projects and creative 3D artwork.
baseurl:
url: "https://www.vleeshouwers.ch"
permalink: pretty
favicon: /img/favicon-32x32.png
gh_sponsor: 
#hide_share_buttons: true
#theme_color: '#eeeeee'
#fixed_navbar: top
#direction: one of <ltr, rtl, auto>, default: ltr
#force_theme: light

paginate: 5
paginate_path: "/blog/page:num"

# Disqus Comments
disqus:
  # Leave shortname blank to disable comments site-wide.
  # Disable comments for any post by adding `comments: false` to that post's YAML Front Matter.
  # shortname: my_disqus_shortname
  shortname: robvlees


plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - kramdown-parser-gfm
  - jekyll-redirect-from

exclude: 
  - Gemfile
  - clean-theme.gemspec
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

livereload: true

sass:
  style: compressed
  source_dir: _sass
  # load_paths: 
    # - node_modules

cookie_policy: /cookie-policy/

defaults:
  
  -
    scope:
      path: ""
      type: "pages"
    values:
      show_sidebar: false
  -
    scope:
      path: "blog"
      type: "pages"
    values:
      author: "R. Vleeshouwers"
      author_image: /img/me_1.jpg
      layout: post
      image: /img/Logo.png
      show_sidebar: true
  -
    scope:
      path: "tutorials"
      type: "pages"
    values:
      author: "R. Vleeshouwers"
      author_image: /img/me_1.jpg
      layout: post
      image: /img/Logo.png
      show_sidebar: false

markdown: kramdown
highlighter: rouge

footer_menu: footer_menu

collections:
  products: 
    output: true
    layout: product
    image: https://picsum.photos/id/16/800/600
    show_sidebar: false
  tutorials:
    output: true
    layout: tutorial
    show_sidebar: false
    permalink: /tutorials/:name/


#google_analytics: UA-code-here
google:
      tag_manager:
        container_id: G-703WPBYY61

jekyll-seo-tag:
      defaults:
        title: "Rob Vleeshouwers | Linux DevOps Engineer & Blender Artist"
        description: "Professional portfolio of Rob Vleeshouwers - Linux DevOps Engineer with expertise in IT infrastructure, security implementation, and Blender 3D artistry. Technical projects and creative 3D artwork."
        image: "/img/Logo.png"
        url: "{{ site.url }}"
        twitter:
          card: summary
          site: "@robvlees"
          creator: "@robvlees"
        og:
          title: "Rob Vleeshouwers | Linux DevOps Engineer & Blender Artist"
          description: "Professional portfolio showcasing expertise in Linux DevOps engineering, IT infrastructure, security implementation, and Blender 3D artistry."
          image: "/img/Logo.png"
          url: "{{ site.url }}"
          type: website
          site_name: "Rob Vleeshouwers Portfolio"
        

facebook:
  publisher: https://www.facebook.com/rob.vleeshouwers
        
social:
  name: Rob Vleeshouwers
  linkedin: https://www.linkedin.com/in/vleeshouwers/
  facebook: https://www.facebook.com/rob.vleeshouwers
  github: https://github.com/robvlees
  vimeo: https://vimeo.com/user5783542
  
  