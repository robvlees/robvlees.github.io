<!-- Newsletter Signup -->
<section class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-8">
                <div class="content has-text-centered">
                    <h2 class="title is-3">Stay Updated</h2>
                    <p class="subtitle is-5">Subscribe to my newsletter for the latest articles and updates</p>
                    
                    <form action="https://formspree.io/f/mqkzvbyb" method="POST" class="has-text-left">
                        <div class="field">
                            <label class="label">Email Address</label>
                            <div class="control">
                                <input type="email" name="email" class="input" placeholder="your.email@example.com" required>
                            </div>
                        </div>
                        
                        <div class="field">
                            <div class="control">
                                <button type="submit" class="button is-primary">Subscribe</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
