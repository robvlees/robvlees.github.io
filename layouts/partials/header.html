<header class="site-header">
    <div class="header-container">
        <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
            <span class="hamburger"></span>
        </button>
        
        <a href="{{ .Site.Home.Permalink }}" class="site-logo">
            <img src="/images/logo.svg" alt="{{ .Site.Title }} Logo" class="logo-img">
        </a>
        
        <nav class="main-nav" id="mainNav">
            <ul class="nav-menu">
                {{ range .Site.Menus.main }}
                <li class="nav-item">
                    <a href="{{ .URL | relURL }}" class="nav-link {{ if eq .URL $.Page.Permalink }}active{{ end }}">
                        {{ .Name }}
                    </a>
                </li>
                {{ end }}
                <li class="nav-item">
                    <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" style="display: none;">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        <svg class="moon-icon" viewBox="0 0 24 24">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </li>
            </ul>
        </nav>
    </div>
</header>

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
    const menuToggle = document.getElementById('menuToggle');
    const navMenu = document.querySelector('.nav-menu');
    
    if (menuToggle && navMenu) {
        menuToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true';
            menuToggle.setAttribute('aria-expanded', !isExpanded);
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('nav-active');
            document.body.classList.toggle('menu-open');
        });
        
        // Close menu when clicking on a nav link
        navMenu.querySelectorAll('.nav-link').forEach(function(link) {
            link.addEventListener('click', function() {
                menuToggle.setAttribute('aria-expanded', 'false');
                menuToggle.classList.remove('active');
                navMenu.classList.remove('nav-active');
                document.body.classList.remove('menu-open');
            });
        });
        
        // Prevent closing when clicking inside the menu
        navMenu.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        
        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            const isClickInsideMenu = navMenu.contains(e.target);
            const isClickOnToggle = menuToggle.contains(e.target);
            
            if (!isClickInsideMenu && !isClickOnToggle && navMenu.classList.contains('nav-active')) {
                menuToggle.setAttribute('aria-expanded', 'false');
                menuToggle.classList.remove('active');
                navMenu.classList.remove('nav-active');
                document.body.classList.remove('menu-open');
            }
        });
    }
});
</script>
